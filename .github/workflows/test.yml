name: Tests

on:
    push:
        branches: [dev]
    pull_request:
        branches: [dev]

jobs:
    api-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                python -m pip install fastapi uvicorn python-multipart httpx pytest numpy opencv-python-headless segmentation-models-pytorch albumentations
                python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
            - name: Download model weights
              run: |
                mkdir -p backend/ml_models/weights
                curl -L -o backend/ml_models/weights/model.pth \
                https://huggingface.co/idident/forgefind_model/resolve/main/casia_tamper_unet_latest.pth
            - name: Run FastAPI tests
              run: cd backend && python -m pytest tests/test_api.py -v
    model-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                python -m pip install fastapi uvicorn python-multipart httpx pytest numpy opencv-python-headless segmentation-models-pytorch albumentations
                python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
            - name: Download model weights
              run: |
                mkdir -p backend/ml_models/weights
                curl -L -o backend/ml_models/weights/model.pth \
                https://huggingface.co/idident/forgefind_model/resolve/main/casia_tamper_unet_latest.pth
            - name: Run model detection tests
              run: cd backend && python -m pytest tests/test_detection.py -v