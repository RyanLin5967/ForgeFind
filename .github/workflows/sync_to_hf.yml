name: Sync to Hugging Face Hub
on:
  push:
    branches: [netlify_test] 
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "ml_models/weights/" > .gitignore
          git add .
          git commit -m "deploy"
          git push --force https://idident:$HF_TOKEN@huggingface.co/spaces/idident/forgefind HEAD:main  