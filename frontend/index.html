<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeFind</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <script type="module" defer src="js/app.js"></script>
</head>
<body id="container">
    <div id="navcontainer">
        <nav id="navbar">
            <div id="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <div id="topleft"><a href="index.html">ForgeFind</a></div>
            </div>
            <div id="other">
                <a id="home" class="item" href="index.html">Home</a>
                <a class="item" href="how-it-works.html">How It Works</a>
                <a class="item" href="faq.html">FAQ</a>
            </div>
        </nav>
    </div>
    <div id="mainpage">
        <div id="text">
            <svg xmlns="http://www.w3.org/2000/svg" id="bigicon" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <div class="labels" id="forgefind">ForgeFind</div>
            <div class="labels" id="desc">AI-Powered Image Manipulation Detection</div>
        </div>
        <div id="select-img">
            <!-- <label id="select"> -->
                <div id="select-box">
                    <svg xmlns="http://www.w3.org/2000/svg" id="upload" width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload-icon lucide-upload"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
                    <div class="labels" id="instructions">Drag image here or browse</div>
                    <div class="labels" id="supports">Supports PNG, JPG, WebP, and other image formats</div>
                </div>
            <!-- </label> -->
            <input type="file" accept="image/*" id="imginput">
        </div> 
    </div>
    <!-- Loading screen elements -->
    <div id="loading-screen" class="hidden"> 
        <div id="loading-circle1"></div>
        <div id="loading-circle2"></div>
        <div id="loading-circle3">
            <div id="scan-line"></div>
        </div>
        <div id="filled-circle"></div>
    </div>
    <!-- results screen elements -->
     <div id="results-page" class="hidden"> <!--add back hidden class after done-->
        <img id="user-img">
        <div id="option-row">
            <button id="org-img-btn" class="option-btns">Original Image</button>
            <button id="noise-btn" class="option-btns">Noise Mask</button>
            <button id="clone-btn" class="option-btns">Clone Detection</button>
            <button id="overall-btn" class="option-btns">Overall</button>
        </div>
        <div id="conf-container" class="result-container">
            <div id="conf-label">Confidence Score</div>
            <div id="conf-percent"> </div> <!-- change percentage to whatever program outputs-->
            <span id="conf-level"></span> <!--change accordingly-->
            <div id="conf-bar"></div> <!-- bar that'll fill up deppending on confidence percentage-->
        </div>
        <!-- need to add color stuff here -->
        <div id="detected-stuff" class="result-container">
            <div id="detected-label">Detected Manipulations</div>
            <div id="c-mf-label" class="detected-labels"><svg class="detected-svgs" id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy-icon lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>Copy-Move Forgery<div id="c-mf-decision"></div></div>
            <div id="c-mf">
                <div id="c-mf-bar"></div><div id="c-mf-percent"></div>
            </div>
            <div id="spl-label" class="detected-labels"><svg class="detected-svgs" id="scissor-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scissors-icon lucide-scissors"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>Splicing <div id="spl-decision"></div></div>
            <div id="spl">
                <div id="spl-bar"></div><div id="spl-percent"></div>
            </div>
        </div>
        <div id="upload-another"><a href="index.html">Upload New Image</a></div>
     </div>
</body>
</html>
